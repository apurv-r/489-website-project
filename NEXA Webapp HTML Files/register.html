<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXA – Create Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="css/base.css" rel="stylesheet" />
    <link href="css/auth.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-nexa fixed-top" id="mainNav">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="index.html">
          <span class="brand-n">N</span><span class="brand-rest">EXA</span>
        </a>
        <div class="d-flex gap-2 ms-auto">
          <a href="login.html" class="btn btn-nexa-outline btn-nexa-sm"
            >Log In</a
          >
        </div>
      </div>
    </nav>

    <!-- Page -->
    <main class="auth-main auth-center">
      <div class="auth-form-card auth-form-card--wide">
        <div class="auth-form-header">
          <div class="auth-logo-mark">
            <span class="brand-n">N</span><span class="brand-rest">EXA</span>
          </div>
          <h1 class="auth-form-title">Create your account</h1>
          <p class="auth-form-subtitle">
            It's free and takes less than a minute
          </p>
        </div>

        <form class="auth-form" id="registerForm" novalidate>
          <!-- Role selector -->
          <div class="auth-field">
            <label>I want to…</label>
            <div class="role-toggle">
              <button
                type="button"
                class="role-toggle-btn active"
                data-role="driver"
              >
                <i class="bi bi-car-front-fill"></i> Find Parking
              </button>
              <button type="button" class="role-toggle-btn" data-role="host">
                <i class="bi bi-house-fill"></i> List My Space
              </button>
            </div>
            <input type="hidden" id="selectedRole" value="driver" />
          </div>

          <!-- Name row -->
          <div class="auth-field-row">
            <div class="auth-field">
              <label for="firstName">First name</label>
              <div class="auth-input-wrap">
                <i class="bi bi-person-fill auth-input-icon"></i>
                <input
                  type="text"
                  id="firstName"
                  class="form-control auth-input"
                  placeholder="John"
                  required
                />
              </div>
            </div>
            <div class="auth-field">
              <label for="lastName">Last name</label>
              <div class="auth-input-wrap">
                <i class="bi bi-person-fill auth-input-icon"></i>
                <input
                  type="text"
                  id="lastName"
                  class="form-control auth-input"
                  placeholder="Doe"
                  required
                />
              </div>
            </div>
          </div>

          <div class="auth-field">
            <label for="regEmail">Email address</label>
            <div class="auth-input-wrap">
              <i class="bi bi-envelope-fill auth-input-icon"></i>
              <input
                type="email"
                id="regEmail"
                class="form-control auth-input"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>

          <div class="auth-field">
            <label for="regPhone"
              >Phone number <span class="auth-optional">(optional)</span></label
            >
            <div class="auth-input-wrap">
              <i class="bi bi-telephone-fill auth-input-icon"></i>
              <input
                type="tel"
                id="regPhone"
                class="form-control auth-input"
                placeholder="+1 (555) 000-0000"
              />
            </div>
          </div>

          <div class="auth-field">
            <label for="regPassword">Password</label>
            <div class="auth-input-wrap">
              <i class="bi bi-lock-fill auth-input-icon"></i>
              <input
                type="password"
                id="regPassword"
                class="form-control auth-input"
                placeholder="Min. 8 characters"
                required
                minlength="8"
              />
              <button
                type="button"
                class="auth-eye-btn"
                id="toggleRegPassword"
                aria-label="Show password"
              >
                <i class="bi bi-eye-fill" id="regEyeIcon"></i>
              </button>
            </div>
            <div
              class="password-strength"
              id="strengthBar"
              style="display: none"
            >
              <div class="strength-track">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
          </div>

          <div class="auth-field">
            <label for="regConfirm">Confirm password</label>
            <div class="auth-input-wrap">
              <i class="bi bi-lock-fill auth-input-icon"></i>
              <input
                type="password"
                id="regConfirm"
                class="form-control auth-input"
                placeholder="Re-enter password"
                required
              />
            </div>
          </div>

          <div class="auth-terms">
            <input
              type="checkbox"
              id="agreeTerms"
              class="auth-checkbox"
              required
            />
            <label for="agreeTerms">
              I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn btn-nexa w-100 auth-submit-btn">
            <i class="bi bi-person-plus-fill me-2"></i>Create Account
          </button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Navbar scroll
      window.addEventListener("scroll", function () {
        document
          .getElementById("mainNav")
          .classList.toggle("scrolled", window.scrollY > 50);
      });

      // Role toggle
      document.querySelectorAll(".role-toggle-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document
            .querySelectorAll(".role-toggle-btn")
            .forEach((b) => b.classList.remove("active"));
          this.classList.add("active");
          document.getElementById("selectedRole").value = this.dataset.role;
        });
      });

      // Password visibility
      document
        .getElementById("toggleRegPassword")
        .addEventListener("click", function () {
          const input = document.getElementById("regPassword");
          const icon = document.getElementById("regEyeIcon");
          if (input.type === "password") {
            input.type = "text";
            icon.className = "bi bi-eye-slash-fill";
          } else {
            input.type = "password";
            icon.className = "bi bi-eye-fill";
          }
        });

      // Password strength meter
      document
        .getElementById("regPassword")
        .addEventListener("input", function () {
          const val = this.value;
          const fill = document.getElementById("strengthFill");
          const label = document.getElementById("strengthLabel");
          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;

          const levels = [
            { pct: "25%", color: "#e74c3c", text: "Weak" },
            { pct: "50%", color: "#e67e22", text: "Fair" },
            { pct: "75%", color: "#f1c40f", text: "Good" },
            { pct: "100%", color: "#00d97e", text: "Strong" },
          ];
          const lvl = levels[Math.max(0, score - 1)] || levels[0];
          const bar = document.getElementById("strengthBar");
          bar.style.display = val.length ? "flex" : "none";
          fill.style.width = lvl.pct;
          fill.style.background = lvl.color;
          label.textContent = lvl.text;
          label.style.color = lvl.color;
        });
    </script>
  </body>
</html>
