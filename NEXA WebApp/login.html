<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXA – Log In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="css/base.css" rel="stylesheet" />
    <link href="css/auth.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-nexa fixed-top" id="mainNav">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="index.html">
          <span class="brand-n">N</span><span class="brand-rest">EXA</span>
        </a>
        <div class="d-flex gap-2 ms-auto">
          <a href="register.html" class="btn btn-nexa btn-nexa-sm">Sign Up</a>
        </div>
      </div>
    </nav>

    <!-- Page -->
    <main class="auth-main auth-center">
      <div class="auth-form-card">
        <div class="auth-form-header">
          <div class="auth-logo-mark">
            <span class="brand-n">N</span><span class="brand-rest">EXA</span>
          </div>
          <h1 class="auth-form-title">Welcome back</h1>
          <p class="auth-form-subtitle">Log in to your NEXA account</p>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
          <div class="auth-field">
            <label for="loginEmail">Email address</label>
            <div class="auth-input-wrap">
              <i class="bi bi-envelope-fill auth-input-icon"></i>
              <input
                type="email"
                id="loginEmail"
                class="form-control auth-input"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>

          <div class="auth-field" style="margin-bottom: 1.5rem">
            <div class="auth-label-row">
              <label for="loginPassword">Password</label>
            </div>
            <div class="auth-input-wrap">
              <i class="bi bi-lock-fill auth-input-icon"></i>
              <input
                type="password"
                id="loginPassword"
                class="form-control auth-input"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="auth-eye-btn"
                id="togglePassword"
                aria-label="Show password"
              >
                <i class="bi bi-eye-fill" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-nexa w-100 auth-submit-btn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
          </button>
        </form>

        <p class="auth-switch">
          Don't have an account? <a href="register.html">Sign up for free</a>
        </p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Toggle password visibility
      document
        .getElementById("togglePassword")
        .addEventListener("click", function () {
          const input = document.getElementById("loginPassword");
          const icon = document.getElementById("eyeIcon");
          if (input.type === "password") {
            input.type = "text";
            icon.className = "bi bi-eye-slash-fill";
          } else {
            input.type = "password";
            icon.className = "bi bi-eye-fill";
          }
        });

      // Navbar scroll
      window.addEventListener("scroll", function () {
        document
          .getElementById("mainNav")
          .classList.toggle("scrolled", window.scrollY > 50);
      });
    </script>
  </body>
</html>
