<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – NEXA</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--nexa-dark);
      }
      .adm-login-wrap {
        width: 100%;
        max-width: 420px;
        padding: 1rem;
      }
      .adm-login-card {
        background: var(--nexa-dark-light);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 18px;
        padding: 2.5rem 2rem;
      }
      .adm-login-logo {
        font-family: var(--font-heading);
        font-size: 1.8rem;
        font-weight: 900;
        background: linear-gradient(135deg, #e74c3c, #ff8a65);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }
      .adm-login-badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #e74c3c;
        background: rgba(231, 76, 60, 0.12);
        border: 1px solid rgba(231, 76, 60, 0.3);
        border-radius: 4px;
        padding: 0.15rem 0.45rem;
        vertical-align: middle;
        margin-left: 0.4rem;
      }
      .adm-login-subtitle {
        font-size: 0.82rem;
        color: var(--nexa-gray-500);
        margin: 0.4rem 0 0;
      }
      .adm-login-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--nexa-gray-400);
        margin-bottom: 0.35rem;
        display: block;
      }
      .adm-login-input {
        width: 100%;
        background: var(--nexa-gray-900);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0.6rem 0.9rem;
        font-size: 0.88rem;
        color: var(--nexa-white);
        outline: none;
        transition: border-color 0.15s;
        font-family: var(--font-body);
      }
      .adm-login-input:focus {
        border-color: #e74c3c;
      }
      .adm-login-input::placeholder {
        color: var(--nexa-gray-600);
      }
      .adm-login-btn {
        width: 100%;
        padding: 0.7rem;
        background: #e74c3c;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        font-family: var(--font-body);
      }
      .adm-login-btn:hover {
        background: #c0392b;
        transform: translateY(-1px);
      }
      .adm-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.07);
        margin: 1.5rem 0;
      }
      .adm-back-link {
        text-align: center;
        font-size: 0.78rem;
        color: var(--nexa-gray-500);
      }
      .adm-back-link a {
        color: var(--nexa-gray-400);
        text-decoration: none;
      }
      .adm-back-link a:hover {
        color: #e74c3c;
      }
    </style>
  </head>
  <body class="adm-page">
    <div class="adm-login-wrap">
      <div class="adm-login-card">
        <div class="text-center mb-4">
          <div>
            <span class="adm-login-logo">NEXA</span>
            <span class="adm-login-badge">Admin</span>
          </div>
          <p class="adm-login-subtitle">
            Restricted access. Authorised personnel only.
          </p>
        </div>

        <form>
          <div class="mb-3">
            <label class="adm-login-label">Admin Email</label>
            <input
              type="email"
              class="adm-login-input"
              placeholder="admin@nexa.io"
            />
          </div>
          <div class="mb-4">
            <label class="adm-login-label">Password</label>
            <div style="position: relative">
              <input
                type="password"
                class="adm-login-input"
                id="admPwd"
                placeholder="••••••••"
                style="padding-right: 2.5rem"
              />
              <button
                type="button"
                onclick="togglePwd()"
                style="
                  position: absolute;
                  right: 0.75rem;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  color: var(--nexa-gray-500);
                  cursor: pointer;
                  font-size: 1rem;
                  padding: 0;
                "
              >
                <i class="bi bi-eye" id="admEyeIcon"></i>
              </button>
            </div>
          </div>
          <a href="dashboard.html" class="d-block">
            <button type="button" class="adm-login-btn">
              Sign In to Admin Portal
            </button>
          </a>
        </form>

        <div class="adm-divider"></div>

        <div class="adm-back-link">
          <i class="bi bi-shield-lock me-1"></i>Secured with 2FA &nbsp;·&nbsp;
          <a href="../index.html">Back to NEXA</a>
        </div>
      </div>
    </div>

    <script>
      function togglePwd() {
        const inp = document.getElementById("admPwd");
        const ico = document.getElementById("admEyeIcon");
        if (inp.type === "password") {
          inp.type = "text";
          ico.className = "bi bi-eye-slash";
        } else {
          inp.type = "password";
          ico.className = "bi bi-eye";
        }
      }
    </script>
  </body>
</html>
